      }
      .warn {
        margin-top: 16px;

        background: #fff;
        padding: 12px 14px;

                letter-spacing: 0.1em;
      .links {
                margin-bottom: 10px;
        margin-top: 20px;
              .subtitle {
                margin: 10px 0 0;
                color: var(--muted);
                line-height: 1.6;
              }
              .grid {
                margin-top: 16px;
                display: grid;
                grid-template-columns: 1fr;

              }
              @media (min-width: 960px) {
                .grid {
                  grid-template-columns: 1.1fr 1fr;

        padding: 10px 14px;
              .form-grid {
        color: var(--fg);
      }
                gap: 8px;
              }
              .form-grid > * {

              }
              label {
                display: block;
                font-size: 13px;

              }
              input,
              select {
                width: 100%;

              button,

              th,

              }
              .foot {
                margin-top: 10px;
                color: var(--muted);
                font-size: 13px;
        background: #111;
      <div class="warn">
        Tam uygulama Next.js API + PostgreSQL kullandigi icin sadece GitHub Pages uzerinde calismaz.
        Canli uygulama icin Vercel, Railway veya Render gibi bir platforma deploy edilmelidir.
            <div class="container">
              <section class="card hero">
                <span class="tag">BuddyMatcher Pages</span>
                <h1>GitHub Pages uzerinde calisan buddy eslestirme</h1>
                <p class="subtitle">
                  Bu surum tamamen statik calisir: katilimcilari tarayicida ekleyip Big Five + ilgi alani benzerligine gore 1 Alman - 1 Turk
                  eslestirmeyi tek tikla uretebilirsin.
                </p>
              </section>

              <section class="grid">
                <article class="card">
                  <h2>Katilimci Ekle</h2>
                  <div class="form-grid">
                    <div>
                      <label for="name">Ad Soyad</label>
                      <input id="name" type="text" placeholder="Orn: Ayse Yilmaz" />
                    </div>
                    <div>
                      <label for="country">Ulke</label>
                      <select id="country">
                        <option value="TR">TR</option>
                        <option value="DE">DE</option>
                      </select>
                    </div>
                    <div>
                      <label for="interests">Ilgi Alanlari</label>
                      <input id="interests" type="text" placeholder="muzik,fotografi,dans" />
                    </div>
                    <div>
                      <label for="openness">Openness (1-10)</label>
                      <input id="openness" type="number" min="1" max="10" value="5" />
                    </div>
                    <div>
                      <label for="conscientiousness">Conscientiousness (1-10)</label>
                      <input id="conscientiousness" type="number" min="1" max="10" value="5" />
                    </div>
                    <div>
                      <label for="extraversion">Extraversion (1-10)</label>
                      <input id="extraversion" type="number" min="1" max="10" value="5" />
                    </div>
                    <div>
                      <label for="agreeableness">Agreeableness (1-10)</label>
                      <input id="agreeableness" type="number" min="1" max="10" value="5" />
                    </div>
                    <div>
                      <label for="neuroticism">Neuroticism (1-10)</label>
                      <input id="neuroticism" type="number" min="1" max="10" value="5" />
                    </div>
                  </div>
                  <div class="actions">
                    <button id="addBtn" class="primary">Katilimci Ekle</button>
                    <button id="sampleBtn">Ornek Veri Yukle</button>
                    <button id="clearBtn">Listeyi Temizle</button>
                  </div>
                  <div id="status" class="status">Hazir.</div>
                </article>

                <article class="card">
                  <h2>Katilimcilar</h2>
                  <div class="actions">
                    <button id="matchBtn" class="primary">Buddy Eslestir</button>
                    <a class="btn" href="https://github.com/Emiray02/BuddyMatcher" target="_blank" rel="noreferrer">Repo</a>
                  </div>
                  <div id="participants" class="list"></div>
                </article>
              </section>

              <section class="card" style="margin-top: 12px">
                <h2>Eslestirme Sonuclari</h2>
                <table>
                  <thead>
                    <tr>
                      <th>Turk Katilimci</th>
                      <th>Alman Katilimci</th>
                      <th>Skor</th>
                    </tr>
                  </thead>
                  <tbody id="results"></tbody>
                </table>
                <p class="foot">Not: 1-1 zorunlu oldugu icin TR ve DE sayilari esit olmalidir.</p>
              </section>
            </div>

            <script>
              const storeKey = "bm_pages_participants";

              function getParticipants() {
                try {
                  return JSON.parse(localStorage.getItem(storeKey) || "[]");
                } catch {
                  return [];
                }
              }

              function setParticipants(list) {
                localStorage.setItem(storeKey, JSON.stringify(list));
              }

              function status(text) {
                document.getElementById("status").textContent = text;
              }

              function readNumber(id) {
                const value = Number(document.getElementById(id).value);
                return Number.isFinite(value) ? value : 0;
              }

              function clampBigFive(n) {
                return Math.max(1, Math.min(10, Math.round(n)));
              }

              function parseInterests(value) {
                return new Set(
                  (value || "")
                    .split(",")
                    .map((x) => x.trim().toLowerCase())
                    .filter(Boolean),
                );
              }

              function jaccard(a, b) {
                if (a.size === 0 && b.size === 0) return 0.5;
                let intersection = 0;
                for (const x of a) {
                  if (b.has(x)) intersection += 1;
                }
                const union = a.size + b.size - intersection;
                return union === 0 ? 0 : intersection / union;
              }

              function compatibility(tr, de) {
                const fields = ["openness", "conscientiousness", "extraversion", "agreeableness", "neuroticism"];
                let sumSq = 0;
                for (const f of fields) {
                  const d = tr[f] - de[f];
                  sumSq += d * d;
                }
                const maxDist = Math.sqrt(fields.length * 9 * 9);
                const personality = (1 - Math.sqrt(sumSq) / maxDist) * 80;
                const interests = jaccard(parseInterests(tr.interests), parseInterests(de.interests)) * 20;
                return Math.max(0, Math.min(100, personality + interests));
              }

              function hungarian(costs) {
                const n = costs.length;
                const m = costs[0].length;
                const u = Array(n + 1).fill(0);
                const v = Array(m + 1).fill(0);
                const p = Array(m + 1).fill(0);
                const way = Array(m + 1).fill(0);

                for (let i = 1; i <= n; i += 1) {
                  p[0] = i;
                  let j0 = 0;
                  const minv = Array(m + 1).fill(Infinity);
                  const used = Array(m + 1).fill(false);
                  do {
                    used[j0] = true;
                    const i0 = p[j0];
                    let delta = Infinity;
                    let j1 = 0;
                    for (let j = 1; j <= m; j += 1) {
                      if (used[j]) continue;
                      const cur = costs[i0 - 1][j - 1] - u[i0] - v[j];
                      if (cur < minv[j]) {
                        minv[j] = cur;
                        way[j] = j0;
                      }
                      if (minv[j] < delta) {
                        delta = minv[j];
                        j1 = j;
                      }
                    }
                    for (let j = 0; j <= m; j += 1) {
                      if (used[j]) {
                        u[p[j]] += delta;
                        v[j] -= delta;
                      } else {
                        minv[j] -= delta;
                      }
                    }
                    j0 = j1;
                  } while (p[j0] !== 0);

                  do {
                    const j1 = way[j0];
                    p[j0] = p[j1];
                    j0 = j1;
                  } while (j0 !== 0);
                }

                const assignment = Array(n).fill(-1);
                for (let j = 1; j <= m; j += 1) {
                  if (p[j] > 0) assignment[p[j] - 1] = j - 1;
                }
                return assignment;
              }

              function renderParticipants() {
                const root = document.getElementById("participants");
                const list = getParticipants();
                if (!list.length) {
                  root.innerHTML = '<div class="item">Henuz katilimci yok.</div>';
                  return;
                }
                root.innerHTML = list
                  .map(
                    (p, i) =>
                      '<div class="item"><div><div class="name">' +
                      p.name +
                      " (" +
                      p.country +
                      ')</div><div class="meta">' +
                      p.interests +
                      '</div></div><button onclick="removeParticipant(' +
                      i +
                      ')">Sil</button></div>',
                  )
                  .join("");
              }

              function renderResults(rows) {
                const root = document.getElementById("results");
                if (!rows.length) {
                  root.innerHTML = '<tr><td colspan="3">Henuz sonuc yok.</td></tr>';
                  return;
                }
                root.innerHTML = rows
                  .map(
                    (r) =>
                      "<tr><td>" +
                      r.trName +
                      "</td><td>" +
                      r.deName +
                      "</td><td>" +
                      r.score.toFixed(1) +
                      "</td></tr>",
                  )
                  .join("");
              }

              function removeParticipant(index) {
                const list = getParticipants();
                list.splice(index, 1);
                setParticipants(list);
                renderParticipants();
                status("Katilimci silindi.");
              }

              window.removeParticipant = removeParticipant;

              document.getElementById("addBtn").addEventListener("click", () => {
                const name = document.getElementById("name").value.trim();
                const country = document.getElementById("country").value;
                const interests = document.getElementById("interests").value.trim();

                if (!name || !interests) {
                  status("Ad ve ilgi alani zorunlu.");
                  return;
                }

                const participant = {
                  name,
                  country,
                  interests,
                  openness: clampBigFive(readNumber("openness")),
                  conscientiousness: clampBigFive(readNumber("conscientiousness")),
                  extraversion: clampBigFive(readNumber("extraversion")),
                  agreeableness: clampBigFive(readNumber("agreeableness")),
                  neuroticism: clampBigFive(readNumber("neuroticism")),
                };

                const list = getParticipants();
                list.push(participant);
                setParticipants(list);
                renderParticipants();
                status("Katilimci eklendi.");
              });

              document.getElementById("sampleBtn").addEventListener("click", () => {
                const sample = [
                  { name: "Ayse", country: "TR", interests: "muzik,dans,fotografi", openness: 8, conscientiousness: 6, extraversion: 7, agreeableness: 8, neuroticism: 4 },
                  { name: "Mehmet", country: "TR", interests: "spor,teknoloji,kahve", openness: 6, conscientiousness: 8, extraversion: 5, agreeableness: 7, neuroticism: 3 },
                  { name: "Lena", country: "DE", interests: "muzik,seyahat,fotografi", openness: 8, conscientiousness: 7, extraversion: 6, agreeableness: 8, neuroticism: 4 },
                  { name: "Jonas", country: "DE", interests: "spor,teknoloji,sinema", openness: 6, conscientiousness: 8, extraversion: 5, agreeableness: 6, neuroticism: 3 },
                ];
                setParticipants(sample);
                renderParticipants();
                status("Ornek veri yuklendi.");
              });

              document.getElementById("clearBtn").addEventListener("click", () => {
                setParticipants([]);
                renderParticipants();
                renderResults([]);
                status("Liste temizlendi.");
              });

              document.getElementById("matchBtn").addEventListener("click", () => {
                const list = getParticipants();
                const tr = list.filter((x) => x.country === "TR");
                const de = list.filter((x) => x.country === "DE");

                if (!tr.length || !de.length) {
                  status("Eslestirme icin hem TR hem DE katilimci olmali.");
                  return;
                }
                if (tr.length !== de.length) {
                  status("1-1 zorunlu: TR ve DE sayilari esit olmali.");
                  return;
                }

                const cost = tr.map((t) => de.map((d) => 100 - compatibility(t, d)));
                const assignment = hungarian(cost);
                const rows = assignment.map((deIndex, trIndex) => ({
                  trName: tr[trIndex].name,
                  deName: de[deIndex].name,
                  score: 100 - cost[trIndex][deIndex],
                }));

                renderResults(rows);
                status("Eslestirme tamamlandi.");
              });

              renderParticipants();
              renderResults([]);
            </script>
